name: Fetch financial snapshots

on:
  schedule:
    # 北京时间 16:00 = UTC 08:00
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare yfinance

      - name: Run snapshot script
        run: python scripts/fetch_snapshots.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/financial-snapshots.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): update financial snapshots"
            git push
          fi
