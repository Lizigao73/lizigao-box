name: Daily Financial Snapshots

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 8:00（北京时间 16:00）抓取
  workflow_dispatch:       # 允许手动触发

# 关键：让 GITHUB_TOKEN 能 push（默认是 read-only，会 403）
permissions:
  contents: write

jobs:
  fetch-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare

      - name: Fetch real data from official sources
        run: |
          echo "=== 调用 fetch_official.py（akshare + sina hq）==="
          python scripts/fetch_official.py

      - name: Verify output
        run: |
          echo "=== financial-snapshots.json head ==="
          head -40 src/data/financial-snapshots.json
          echo ""
          echo "=== File size ==="
          ls -lh src/data/financial-snapshots.json

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain src/data/)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✓ 检测到新数据，准备提交"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无新数据，跳过提交"
          fi

      - name: Commit & push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/financial-snapshots.json
          git commit -m "chore(data): 每日自动抓取 [skip ci]

          数据源（全部官方/权威）：
            - A 股 (sh000001, sz399001): akshare.stock_zh_index_daily
            - 标普 500 / 纳指: akshare.index_us_stock_sina
            - 伦敦金 (XAU): akshare.futures_foreign_hist
            - 美元指数 (DXY): sina hq DINI

          时间戳: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
